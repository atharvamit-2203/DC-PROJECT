syntax = "proto3";

package user;

service UserService {
  rpc RegisterUser(RegisterRequest) returns (RegisterResponse);
  rpc LoginUser(LoginRequest) returns (LoginResponse);
  rpc AuthenticateUser(AuthRequest) returns (AuthResponse);
}

message RegisterRequest {
  string username = 1;
  string email = 2;
  string password = 3;
}

message RegisterResponse {
  bool success = 1;
  string message = 2;
  string user_id = 3;
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  bool success = 1;
  string message = 2;
  string token = 3;
  string user_id = 4;
}

message AuthRequest {
  string token = 1;
}

message AuthResponse {
  bool valid = 1;
  string user_id = 2;
  string username = 3;
}
